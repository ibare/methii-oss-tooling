name: Release

on:
  push:
    branches: [main]
  # 첫 publish 전용 수동 트리거. `initial-publish: true`로 실행하면
  # changeset 없이 현재 버전 그대로 npm에 publish한다.
  # 첫 0.1.0이 등록된 이후로는 사용하지 말 것 (재실행 시 npm이 409로 거부).
  workflow_dispatch:
    inputs:
      initial-publish:
        description: '첫 publish 모드 (changeset 없이 현재 버전 publish)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write  # npm provenance용 OIDC 토큰

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # ----- 첫 publish 전용 (workflow_dispatch + initial-publish=true) -----
      - name: Initial Publish
        if: github.event_name == 'workflow_dispatch' && inputs.initial-publish
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ----- 일반 자동화 (main push에서 changeset 기반) -----
      - name: Create Release PR or Publish
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: 릴리스"
          title: "chore: 릴리스"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
